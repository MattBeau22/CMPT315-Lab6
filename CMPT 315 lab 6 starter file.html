<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lab 6 — Trivia Challenge (Starter, Ch 9–10)</title>

    <!--
    ======================================================
    CMPT 315 — Lab 6 Starter 
    ======================================================

    WHAT THIS APP DOES (big picture):
    - A player enters Name + Email (validated).
    - The app fetches multiple-choice trivia questions from Open Trivia DB (no API key).
    - The player answers all questions in ONE round.
    - The app shows a final score AND an Answer Review on the Result screen.
    - The app saves a BEST SCORE in localStorage (so it survives refresh).


    IMPORTANT:
    - Keep element IDs the same (btnStart, screenQuiz, apiErrorBox, etc.).
      The JavaScript uses document.getElementById() to locate elements.
	  
	- Use const by default for values that do not get reassigned 
	(e.g., DOM element references, configuration objects, fixed arrays). 
	Use let only for variables that need to change during execution 
	(e.g., loop counters, accumulating totals, values updated inside functions).
  -->
    <style>
      /* =========================
       Task F: Creative UX
       You may customize colors,
       fonts, and button styles.
       ========================= */
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #636F99;
        color: #eef2ff;
      }
      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 18px;
      }
      .card {
        background: #121b2e;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 14px;
      }
      label {
        display: block;
        font-weight: 700;
        margin-top: 10px;
      }
      input,
      select {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid white;
        background: #395275;
        color: black;
      }
      button {
        padding: 10px 14px;
        border-radius: 10px;
        border: 0;
        font-weight: 700;
        cursor: pointer;
      }
      button.primary {
        background: #8D93C7;
        color: white;
      }
      button.secondary {
        background: rgba(255, 255, 255, 0.1);
        color: white;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      @media (max-width: 720px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
      .err {
        color: #fb7185;
        min-height: 18px;
        font-size: 0.9rem;
      }
      .pill {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        color: rgba(255, 255, 255, 0.85);
      }
      .hidden {
        display: none !important;
      }
      /* !important to overrides other css rules if conflict arises (like inline styles). */
      .notice {
        padding: 10px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.06);
      }
      .choices {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }
      .choiceBtn {
        text-align: left;
        width: 100%;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #eef2ff;
      }
      .choiceBtn:hover {
        border-color: rgba(255, 255, 255, 0.25);
      }
      .topbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: space-between;
        align-items: center;
      }

      #headerImh {
        width: 100%;
        border-radius: 12px;
        margin-bottom: 14px;
        object-fit: cover;
        max-height: 300px;
      }
    </style>
  </head>

  <body>
    <main>
      <!-- ============================
       HEADER / BRAND AREA (Task F)
      
       ============================ -->
       <figure>
        <img
        src="images/towfiqu-barbhuiya-oZuBNC-6E2s-unsplash.jpg"
        alt="question mark on pink background"
        id="headerImh"
        title = "Photo by Towfiqu Barbhuiya on Unsplash"
      />
        <figcaption>Photo by Towfiqu Barbhuiya on Unsplash</figcaption>

      <div class="topbar">
        <h1>Trivia Nights!</h1>
        <span class="pill"
          >Ch 9–10: DOM + Events + Async APIs + localStorage</span
        >
      </div>

      <!-- ============================
       SCREEN 1: START SCREEN
       ============================ -->
      <section class="card" id="screenStart">
        <h2>Start</h2>

        <div class="notice">
          <p><b>Goal:</b> Complete one trivia round and see your score.</p>
          <p>
            <b>Storage:</b> Your best score is saved in
            <b>localStorage</b> (this browser only).
          </p>
        </div>

        <div class="row">
          <div>
            <label for="name">Name</label>
            <input id="name" placeholder="Your name" />
            <div class="err" id="errName"></div>
          </div>
          <div>
            <label for="email">Email</label>
            <input id="email" placeholder="you@example.com" />
            <div class="err" id="errEmail"></div>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="category">Category (optional)</label>
            <select id="category">
              <option value="">Any Category</option>
              <option value="18">Computers</option>
              <option value="17">Science & Nature</option>
              <option value="19">Mathematics</option>
              <option value="9">General Knowledge</option>
            </select>
          </div>
          <div>
            <!-- Task D: Difficulty selection -->
            <label for="mode">Difficulty</label>
            <select id="mode">
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>
        </div>

        <div class="topbar" style="margin-top: 12px">
          <button class="primary" id="btnStart">Start Quiz</button>
          <button class="secondary" id="btnReset">Reset Best Score</button>
        </div>

        <div style="margin-top: 12px" class="notice" id="progressBox">
          Best score: not loaded yet…
        </div>
      </section>

      <!-- ============================
       SCREEN 2: QUIZ SCREEN
       ============================ -->
      <section class="card hidden" id="screenQuiz">
        <div class="topbar">
          <h2 id="quizTitle">Trivia Round</h2>
          <div>
            <span class="pill">Score: <b id="score">0</b></span>
            <span class="pill"
              >Q: <b id="qNum">1</b>/<span id="qTotal">10</span></span
            >
          </div>
        </div>

        <div class="notice hidden" id="loadingBox">Loading questions…</div>
        <div class="notice hidden" id="apiErrorBox"></div>

        <div class="notice" id="questionText">Question will appear here…</div>
        <div class="choices" id="choices"></div>

        <div class="topbar" style="margin-top: 12px">
          <button class="secondary" id="btnQuit">Quit</button>
        </div>
      </section>

      <!-- ============================
       SCREEN 3: RESULT SCREEN
       ============================ -->
      <section class="card hidden" id="screenResult">
        <h2 id="resultTitle">Result</h2>
        <div class="notice" id="resultText"></div>

        <!-- Task E: Answer Review (displayed at end) -->
        <div
          class="notice"
          id="reviewBox"
          style="white-space: pre-wrap; margin-top: 10px"
        >
          Answer review will appear here…
        </div>

        <div class="topbar" style="margin-top: 12px">
          <button class="primary" id="btnPlayAgain">Play Again</button>
          <button class="secondary" id="btnHome">Home</button>
        </div>
      </section>
    </main>

    <script>
      /*
        ======================================================
        LAB 6 — TRIVIA CHALLENGE
        ======================================================

        COMPLETE THESE TODO ITEMS (Ch. 9–10):
        - TODO #1 validateStartForm()      (Ch 9)
        - TODO #2 loadProgress()          (Ch 10 localStorage)
        - TODO #3 saveProgress(obj)       (Ch 10 localStorage)
        - TODO #4 getToken()              (Ch 10 fetch + async/await)
        - TODO #5 fetchQuestions(cfg)     (Ch 10 fetch + response_code handling)


        - Task D: Difficulty selection
            * The Difficulty dropdown (id="mode") gives "easy", "medium", or "hard".
            * You must set ROUND.difficulty based on that selection before fetching questions.

        - Task E: Show Answer Review at the end
            * Save the user's chosen answer for each question.
            * On the Result screen, list each question with:
                - Your answer
                - Correct answer
                - A mark ✓ or ✗

        NOTE:
        - Use textContent when showing user data.
      */

      (function () {
        "use strict"; //What is this???

        // ------------------------------------------------------
        // Round configuration
        // ------------------------------------------------------
        var ROUND = { difficulty: "easy", amount: 10 }; //Why is this here???

        // Save best score in this browser (localStorage)
        var STORAGE_KEY = "lab6_trivia_best"; //This is a mistake should be let or const. Then why is everything var???

        // Open Trivia DB endpoints (no API key required)
        var API = {
          token: "https://opentdb.com/api_token.php?command=request",
          questionsUrl: function (amount, difficulty, category, token) {
            var p = new URLSearchParams(); //built in function used for automatically/dynamically producing query string.
            p.set("amount", String(amount));
            p.set("difficulty", difficulty);
            p.set("type", "multiple");
            if (category) {
              p.set("category", category);
            }
            if (token) {
              p.set("token", token);
            }
            return "https://opentdb.com/api.php?" + p.toString(); //this takes the URLSearchParams object and produces a query string like "amount=10&difficulty=easy&type=multiple&
          },
        };

        function $(id) {
          return document.getElementById(id);
        }

        // Screens
        var screenStart = $("screenStart");
        var screenQuiz = $("screenQuiz");
        var screenResult = $("screenResult");

        // Inputs
        var nameInput = $("name");
        var emailInput = $("email");
        var categorySelect = $("category");
        var modeSelect = $("mode"); // Difficulty dropdown: easy/medium/hard

        // Errors
        var errName = $("errName");
        var errEmail = $("errEmail");

        // Buttons
        var btnStart = $("btnStart");
        var btnReset = $("btnReset");
        var btnQuit = $("btnQuit");
        var btnPlayAgain = $("btnPlayAgain");
        var btnHome = $("btnHome");

        // Progress UI
        var progressBox = $("progressBox");

        // Quiz UI
        var quizTitle = $("quizTitle");
        var scoreEl = $("score");
        var qNumEl = $("qNum");
        var qTotalEl = $("qTotal");
        var questionText = $("questionText");
        var choicesBox = $("choices");

        // Loading + errors
        var loadingBox = $("loadingBox");
        var apiErrorBox = $("apiErrorBox");

        // Result UI
        var resultTitle = $("resultTitle");
        var resultText = $("resultText");
        var reviewBox = $("reviewBox");

        // Runtime state
        var state = {
          //curent state of the user
          player: { name: "", email: "", category: "", mode: "easy" },
          token: null, //as soon as you've made the api call, you need to change this
          questions: [],
          idx: 0,
          score: 0,
        };

        // Screen helpers
        function show(el) {
          el.classList.remove("hidden");
        }
        function hide(el) {
          el.classList.add("hidden");
        }

        function showOnly(which) {
          //this hides everything and chooses a which to show.
          hide(screenStart);
          hide(screenQuiz);
          hide(screenResult);
          show(which);
        }

        function setLoading(on) {
          // Show or hide the loading message on the quiz screen could add animation if you want.
          if (on) {
            show(loadingBox);
          } else {
            hide(loadingBox);
          }
        }

        function setApiError(msg) {
          //Creates a specific div to show that an error occurred instead of having the browser to handle it.
          if (!msg) {
            apiErrorBox.textContent = "";
            hide(apiErrorBox);
            return;
          }
          apiErrorBox.textContent = msg;
          show(apiErrorBox);
        }

        function decodeHTMLEntities(s) {
          //The API returns some text with HTML entities (e.g., &amp; instead of &). This decodes those entities into normal characters.
          var t = document.createElement("textarea"); // creates ahypothetical textarea element that we can use to decode HTML entities.
          t.innerHTML = s;
          return t.value;
        }

        function shuffle(arr) {
          // This is a standard algorithm to shuffle an array in-place. We use it to randomize the order of the correct and incorrect choices for each question. Otherwise the corect answer may always be in the 'a' spot
          var a = arr.slice();
          var i, j, tmp;
          for (i = a.length - 1; i > 0; i--) {
            j = Math.floor(Math.random() * (i + 1));
            tmp = a[i];
            a[i] = a[j];
            a[j] = tmp;
          }
          return a;
        }

        // ======================================================
        // TODO #1 (Ch 9): Form validation
        // ======================================================
        function validateStartForm() {
          // TODO:
          // - Name: 2–30 characters after trim()
          // - Email: basic valid shape (example: a@b.com)
          // - Show errors in errName / errEmail
          // - Return true if valid else false
          errName.textContent = "";
          errEmail.textContent = "";
          const emailPattern = /@./;
          if (
            nameInput.value.trim().length < 2 ||
            nameInput.value.trim().length > 30
          ) {
            errName.textContent =
              "Username must be between 2 and 30 characers in length";
            return false;
          }
          if (!emailPattern.test(emailInput.value.trim())) {
            errEmail.textContent = "Please enter a valid email address";
            return false;
          }

          return true;
        }

        // ======================================================
        // TODO #2 (Ch 10): Load best score from localStorage
        // ======================================================
        function loadProgress() {
          // TODO: implement robust load:
          // - Return default { bestScore: 0, bestTotal: 0, attempts: 0 } if missing/invalid

          try {
            var loadData = JSON.parse(localStorage.getItem(STORAGE_KEY));
            return loadData;
          } catch (e) {
            return { bestScore: 0, bestTotal: 0, attempts: 0 };
          }
        }

        // ======================================================
        // TODO #3 (Ch 10): Save best score to localStorage
        // ======================================================
        function saveProgress(obj) {
          //Want to save progress in the browser. If in private mode may need to have a try catch and display a warning that progress cannot be saved.
          // TODO: JSON.stringify + localStorage.setItem(STORAGE_KEY, ...)

          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); //Why obj???
          } catch (e) {
            alert(
              "Unable to save progress. Your browser may be in private mode.",
            );
          }
        }

        // ======================================================
        // TODO #4 (Ch 10): Request a token from OpenTDB
        // ======================================================
        async function getToken() {
          // TODO:
          // - var res = await fetch(API.token)
          // - if (!res.ok) throw Error(...)
          // - var data = await res.json()
          // - if (!data.token) throw Error(...)
          // - return data.token

          var res = await fetch(API.token);
          if (!res.ok) {
            throw Error("Failed to get token from API.");
          }
          var data = await res.json();
          if (!data.token) {
            //Why .token???
            throw Error("API response did not include a token.");
          }
          return data.token;
        }

        // ======================================================
        // TODO #5 (Ch 10): Fetch questions for the round
        // ======================================================
        async function fetchQuestions(cfg) {
          // TODO:
          // - build URL using API.questionsUrl(cfg.amount, cfg.difficulty, state.player.category, state.token)
          // - fetch + await json
          // - handle response_code:
          //   0 -> return results
          //   5 -> throw rate limit error
          //   else -> throw generic error
          var url = API.questionsUrl(
            //What is this???
            cfg.amount,
            cfg.difficulty,
            state.player.category,
            state.token,
          );
          var urlRes = await fetch(url); //Why do we need to do this??? Didn't we already do it???
          if (!urlRes.ok) {
            throw Error("Failed to fetch questions from API.");
          }
          var urlData = await urlRes.json();
          if (urlData.response_code === 0) {
            //What is a response code again???
            return urlData.results;
          } else if (urlData.response_code === 5) {
            throw Error("API rate limit exceeded. Please try again later.");
          } else {
            throw Error("API returned error code: " + urlData.response_code);
          }
          return [];
        }

        // Display best score summary on Start screen
        function renderBest() {
          //Will show an area for this information.
          var p = loadProgress();
          var bestScore =
            p && typeof p.bestScore === "number" ? p.bestScore : 0;
          var bestTotal =
            p && typeof p.bestTotal === "number" ? p.bestTotal : 0;
          var attempts = p && typeof p.attempts === "number" ? p.attempts : 0;

          if (bestTotal > 0) {
            progressBox.textContent =
              "Best score: " +
              bestScore +
              "/" +
              bestTotal +
              " • Attempts: " +
              attempts;
          } else {
            progressBox.textContent =
              "Best score: none yet • Attempts: " + attempts;
          }
        }

        // Copy inputs into state.player
        function startFromForm() {
          state.player.name = nameInput.value.trim();
          state.player.email = emailInput.value.trim();
          state.player.category = categorySelect.value;
          state.player.mode = modeSelect.value; // stores easy/medium/hard
        }

        function beginRound() {
          state.questions = [];
          state.idx = 0;
          state.score = 0;

          scoreEl.textContent = "0";
          qNumEl.textContent = "1";
          qTotalEl.textContent = String(ROUND.amount);
          setApiError(null);
        }

        function renderQuestion() {
          var q = state.questions[state.idx]; //Why is there 2 states here???

          // Show current difficulty in the title
          quizTitle.textContent = "Trivia Round (" + ROUND.difficulty + ")";

          qTotalEl.textContent = String(ROUND.amount);
          qNumEl.textContent = String(state.idx + 1);

          questionText.textContent = q.question;
          choicesBox.innerHTML = "";

          var i;
          for (i = 0; i < q.choices.length; i++) {
            (function (choiceText) {
              var btn = document.createElement("button");
              btn.className = "choiceBtn";
              btn.textContent = choiceText;

              btn.addEventListener("click", function () {
                handleAnswer(choiceText);
              });

              choicesBox.appendChild(btn);
            })(q.choices[i]);
          }
        }

        function handleAnswer(choiceText) {
          var q = state.questions[state.idx];

          // --------------------------------------------
          // Task E (Answer Review) — PARTIAL PROVIDED
          // --------------------------------------------
          // TODO (students): Save the user's choice on the question object.
          // Example:
          // q.userChoice = choiceText;
          q.userChoice = choiceText; //Is this correct??? What is q???

          if (choiceText === q.correct) {
            //Where is q.correct coming from???
            state.score = state.score + 1;
            scoreEl.textContent = String(state.score);
          }

          state.idx = state.idx + 1;

          if (state.idx >= ROUND.amount) {
            finishRound();
          } else {
            renderQuestion();
          }
        }

        function finishRound() {
          showOnly(screenResult);

          resultTitle.textContent = "Result";
          resultText.textContent =
            state.player.name +
            ", your score is " +
            state.score +
            "/" +
            ROUND.amount +
            ".";

          // --------------------------------------------
          // Task E (Answer Review) — PARTIAL PROVIDED
          // --------------------------------------------
          // We will build a multi-line string and show it in reviewBox.
          // TODO: Finish the lines that show:
          // - Your answer (qq.userChoice)
          // - Correct answer (qq.correct)
          // - A mark ✓ or ✗ depending on whether they match
          // TODO: Add these lines and any ✓/✗ marking you want.
          // HINT:
          //  yourAns = qq.userChoice
          //  ok = (yourAns === qq.correct)
          //  use lines.push to show ✓ or ✗

          var lines = [];
          lines.push("Answer Review (Your answer vs Correct answer):");
          lines.push("");

          var i;
          for (i = 0; i < state.questions.length; i++) {
            var qq = state.questions[i];
            console.log(qq);
            lines.push(i + 1 + ") " + qq.question);
            var yourAns = qq.userChoice;
            console.log(yourAns);
            if (yourAns === qq.correct) {
              lines.push("✓ Your answer: " + yourAns);
            } else {
              lines.push("✗ Your answer: " + yourAns);
            }

            lines.push("");
          }

          // Show the review text on the page
          reviewBox.textContent = lines.join("\n");

          // Update best score in localStorage
          var p = loadProgress();
          var attempts = p && typeof p.attempts === "number" ? p.attempts : 0;
          attempts = attempts + 1;

          var bestScore =
            p && typeof p.bestScore === "number" ? p.bestScore : 0;
          var bestTotal =
            p && typeof p.bestTotal === "number" ? p.bestTotal : 0;

          if (bestTotal === 0 || state.score > bestScore) {
            saveProgress({
              bestScore: state.score,
              bestTotal: ROUND.amount,
              attempts: attempts,
            });
          } else {
            saveProgress({
              bestScore: bestScore,
              bestTotal: bestTotal,
              attempts: attempts,
            });
          }

          renderBest();
        }

        async function runRoundFlow() {
          if (!validateStartForm()) {
            return;
          }

          startFromForm();

          // --------------------------------------------------
          // Task D (Difficulty selection)
          // --------------------------------------------------
          // TODO : Set (ROUND.difficulty) based on the dropdown selection (state - player - mode).
          // The dropdown provides: "easy", "medium", or "hard"
          state.player.mode = modeSelect.value;
          ROUND.difficulty = state.player.mode; //Why???? Is this correct???

          beginRound();
          showOnly(screenQuiz);

          try {
            setLoading(true);

            if (!state.token) {
              state.token = await getToken();
            }

            var raw = await fetchQuestions(ROUND);

            // Normalize API data into internal format
            state.questions = [];
            var i;
            for (i = 0; i < raw.length; i++) {
              var item = raw[i];

              var correct = decodeHTMLEntities(item.correct_answer);

              var incorrect = [];
              var k;
              for (k = 0; k < item.incorrect_answers.length; k++) {
                incorrect.push(decodeHTMLEntities(item.incorrect_answers[k]));
              }

              var choices = shuffle([correct].concat(incorrect));

              state.questions.push({
                question: decodeHTMLEntities(item.question),
                correct: correct,
                choices: choices,
              });
            }

            setLoading(false);
            renderQuestion();
          } catch (e) {
            setLoading(false);
            setApiError(e.message || "Network / API error.");
          }
        }

        // Event listeners
        btnStart.addEventListener("click", function () {
          runRoundFlow();
        });

        btnReset.addEventListener("click", function () {
          localStorage.removeItem(STORAGE_KEY);
          renderBest();
          alert("Best score reset.");
        });

        btnQuit.addEventListener("click", function () {
          showOnly(screenStart);
        });

        btnPlayAgain.addEventListener("click", function () {
          runRoundFlow();
        });

        btnHome.addEventListener("click", function () {
          showOnly(screenStart);
        });

        // Boot
        renderBest();
        showOnly(screenStart);
      })();
    </script>
  </body>
</html>
